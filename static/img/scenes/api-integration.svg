  <rect x="170" y="80" width="60" height="60" rx="8" fill="white" fill-opacity="0.9"/>
  <text x="200" y="115" text-anchor="middle" fill="#a18cd1" font-size="12" font-weight="bold">API</text>
  
  <rect x="170" y="160" width="60" height="60" rx="8" fill="white" fill-opacity="0.9"/>
  <text x="200" y="195" text-anchor="middle" fill="#a18cd1" font-size="12" font-weight="bold">API</text>
  
  <rect x="260" y="120" width="60" height="60" rx="8" fill="white" fill-opacity="0.9"/>
