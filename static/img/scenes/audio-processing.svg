<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="url(#gradient2)"/>
  <defs>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Waveform -->
  <rect x="80" y="140" width="4" height="20" rx="2" fill="white" fill-opacity="0.9"/>
  <rect x="90" y="130" width="4" height="40" rx="2" fill="white" fill-opacity="0.9"/>
  <rect x="100" y="120" width="4" height="60" rx="2" fill="white" fill-opacity="0.9"/>
  <rect x="110" y="110" width="4" height="80" rx="2" fill="white" fill-opacity="0.9"/>
  <rect x="120" y="125" width="4" height="50" rx="2" fill="white" fill-opacity="0.9"/>
  <rect x="130" y="135" width="4" height="30" rx="2" fill="white" fill-opacity="0.9"/>
  <rect x="140" y="145" width="4" height="10" rx="2" fill="white" fill-opacity="0.9"/>
  
  <!-- Microphone icon -->
  <ellipse cx="200" cy="130" rx="15" ry="25" fill="white" fill-opacity="0.9"/>
  <rect x="195" y="155" width="10" height="20" fill="white" fill-opacity="0.9"/>
  <rect x="185" y="175" width="30" height="4" rx="2" fill="white" fill-opacity="0.9"/>
  
  <!-- Speaker waves -->
  <path d="M280 120 Q300 120 300 150 Q300 180 280 180" stroke="white" stroke-width="3" fill="none" stroke-opacity="0.8"/>
  <path d="M290 130 Q305 130 305 150 Q305 170 290 170" stroke="white" stroke-width="2" fill="none" stroke-opacity="0.6"/>
</svg>