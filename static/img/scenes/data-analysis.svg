<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="url(#gradient3)"/>
  <defs>
    <linearGradient id="gradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Chart background -->
  <rect x="80" y="80" width="240" height="140" rx="8" fill="white" fill-opacity="0.9"/>
  
  <!-- Bar chart -->
  <rect x="100" y="160" width="20" height="40" rx="2" fill="#ff9a9e"/>
  <rect x="130" y="140" width="20" height="60" rx="2" fill="#ff9a9e"/>
  <rect x="160" y="120" width="20" height="80" rx="2" fill="#ff9a9e"/>
  <rect x="190" y="150" width="20" height="50" rx="2" fill="#ff9a9e"/>
  <rect x="220" y="130" width="20" height="70" rx="2" fill="#ff9a9e"/>
  <rect x="250" y="170" width="20" height="30" rx="2" fill="#ff9a9e"/>
  <rect x="280" y="110" width="20" height="90" rx="2" fill="#ff9a9e"/>
  
  <!-- Axis lines -->
  <line x1="90" y1="210" x2="320" y2="210" stroke="#666" stroke-width="2"/>
  <line x1="90" y1="90" x2="90" y2="210" stroke="#666" stroke-width="2"/>
  
  <!-- Data points -->
  <circle cx="340" cy="120" r="6" fill="white" fill-opacity="0.9"/>
  <circle cx="340" cy="140" r="6" fill="white" fill-opacity="0.9"/>
  <circle cx="340" cy="160" r="6" fill="white" fill-opacity="0.9"/>
</svg>